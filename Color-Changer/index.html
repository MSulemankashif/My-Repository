<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changer</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css" integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>

</head>
<body>
<h1 style="color: white;">Color Changer</h1>
    <div class="container">
        <button id="changeColor" class="btn btn-primary" >Change Theme</button>
    </div>

<script>
    let btn = document.getElementById("changeColor");

    btn.addEventListener("click", function(){
        let r = Math.floor(Math.random()*256);
        let g = Math.floor(Math.random()*256);
        let b = Math.floor(Math.random()*256);

        let color = `rgb(${r}, ${g}, ${b})`;

        document.body.style.backgroundColor = color;
    })

    let res = Math.min(-10,1,2,3,4,5,6);
    console.log(res);

    let text = "Visit W3Schools";
    let n = text.search(/w3schools/);
    console.log(n);


    let text1 = "I love Javascript";
    let pattern = /Javascript/;

    console.log(pattern.test(text1));
    
    

    
    

</script>
</body>
</html>
